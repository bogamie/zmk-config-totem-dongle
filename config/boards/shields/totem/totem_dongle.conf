# better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_STUDIO=y

# dongle mode
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Fetch peripheral battery levels on the central — required by the
# host-side battery monitor (zmk-totem-battery-tray) so it can read
# left/right battery values out via a custom HID report.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Reserve a second USB HID interface slot for the custom battery report
# device. The first slot is taken by ZMK's keyboard HID; the second is
# registered from battery_hid.c.
CONFIG_USB_HID_DEVICE_COUNT=2

# Turn on logging, and set ZMK logging to debug output
CONFIG_ZMK_USB_LOGGING=y
CONFIG_LOG_DEFAULT_LEVEL=3
